spring.datasource.url=jdbc:h2:mem:authdb-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
eureka.client.enabled=false
auth.jwt.secret=test-secret-key-at-least-32-characters-long
auth.jwt.access-token-expiration-minutes=15
auth.jwt.refresh-token-expiration-days=7
