server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: auth-admin-login
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/admin/auth/login,/api/v1/admin/auth/refresh,/api/v1/admin/auth/logout
            - id: auth-admin-me
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/admin/me
            - id: product-admin
              uri: lb://product-service
              predicates:
                - Path=/api/v1/admin/**
            - id: product-public
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/categories/**
                - Method=GET
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/cart/**,/api/v1/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: "dev-secret-change-in-production-min-32-chars!!"

management:
  endpoints:
    web:
      exposure:
        include: health,info
