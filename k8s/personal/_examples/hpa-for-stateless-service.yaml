# Copy this pattern for product-service, order-service, etc.
# Clients register with Eureka using the same spring.application.name; K8s Service
# load-balances traffic across pod replicas.
#
# Eureka URL for apps in the personal namespace:
#   http://service-discovery.personal.svc.cluster.local:8761/eureka/
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service
  namespace: personal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
