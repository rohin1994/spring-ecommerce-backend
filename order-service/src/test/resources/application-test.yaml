spring:
  datasource:
    url: jdbc:h2:mem:orderdb-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false

order:
  kafka:
    enabled: false
