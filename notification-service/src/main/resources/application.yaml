server:
  port: 8087

spring:
  application:
    name: notification-service
  mongodb:
    uri: mongodb://localhost:27017/notification_db
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ecommerce.notification_service.model.event

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  kafka:
    enabled: false
    topics:
      payment-completed: payment-completed
      payment-failed: payment-failed

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: kubernetes
  mongodb:
    uri: mongodb://mongodb:27017/notification_db
  autoconfigure:
    exclude:
      - org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://service-discovery.personal.svc.cluster.local:8761/eureka/
  instance:
    prefer-ip-address: true
